# YHRG S1 Arm configuration

arm:
  dev: "/dev/ttyUSB0"
  mode: "only_sim"           # "only_sim", "only_real", "real_control_sim"
  end_effector: "gripper"    # "None", "gripper", "teach"
  check_collision: true
  arm_version: "V2"

# Joint limits (radians), matching S1 SDK
joint_limits:
  j1: [-2.967, 2.967]   # -170° ~ 170°
  j2: [0.0, 3.142]      # 0° ~ 180°
  j3: [0.0, 2.967]      # 0° ~ 170°
  j4: [-1.571, 1.518]  # -90° ~ 87°
  j5: [-1.571, 1.571]  # -90° ~ 90°
  j6: [-1.571, 1.571]  # -90° ~ 90°
  j7: [-1.745, 1.745]  # -100° ~ 100°

# Safety settings
safety:
  max_joint_speed_rad_s: 1.0
  max_cartesian_speed_m_s: 0.5
  workspace:
    x: [0.1, 0.6]
    y: [-0.4, 0.4]
    z: [0.05, 0.8]
